<div class="page-content">
  <h1 class="section-title">My Notes</h1>

  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Search notes</mat-label>
    <input matInput [value]="searchQuery()" (input)="searchQuery.set($any($event.target).value)" />
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  @if (!filteredNotes().length) {
    <p class="empty">No notes yet. Add notes from any Sefirah or Path detail page.</p>
  }

  @for (note of filteredNotes(); track note.id) {
    <mat-card class="note-card">
      <mat-card-header>
        <mat-card-subtitle>
          <a [routerLink]="getEntityRoute(note)">{{ note.entityType | titlecase }}: {{ note.entityId }}</a>
          · {{ note.updatedAt | date:'short' }}
        </mat-card-subtitle>
      </mat-card-header>
      <mat-card-content><p>{{ note.content }}</p></mat-card-content>
      <mat-card-actions align="end">
        <button mat-icon-button color="warn" (click)="deleteNote(note.id)" aria-label="Delete note">
          <mat-icon>delete</mat-icon>
        </button>
      </mat-card-actions>
    </mat-card>
  }
</div>
