name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push kabbalah web image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/ryanradder11/kabbalah-web:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: 217.154.167.167
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u ryanradder11 --password-stdin
            cd /root/kabbalah-study
            docker compose -f compose.prod.yaml pull web
            docker compose -f compose.prod.yaml up -d
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
