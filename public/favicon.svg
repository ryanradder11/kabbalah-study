<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#2d0a5c"/>
      <stop offset="100%" stop-color="#0d0020"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="5" fill="url(#bg)"/>

  <!-- Tree of Life paths -->
  <g stroke="#c9a84c" stroke-width="0.65" opacity="0.8" fill="none">
    <!-- Kether to Chokmah & Binah -->
    <line x1="16" y1="3" x2="25" y2="8"/>
    <line x1="16" y1="3" x2="7"  y2="8"/>
    <!-- Middle pillar top -->
    <line x1="16" y1="3" x2="16" y2="18"/>
    <!-- Right pillar -->
    <line x1="25" y1="8"  x2="25" y2="15"/>
    <line x1="25" y1="15" x2="25" y2="23"/>
    <!-- Left pillar -->
    <line x1="7"  y1="8"  x2="7"  y2="15"/>
    <line x1="7"  y1="15" x2="7"  y2="23"/>
    <!-- Upper diagonals to Tiphareth -->
    <line x1="25" y1="8"  x2="16" y2="18"/>
    <line x1="7"  y1="8"  x2="16" y2="18"/>
    <line x1="25" y1="15" x2="16" y2="18"/>
    <line x1="7"  y1="15" x2="16" y2="18"/>
    <!-- Tiphareth to Netzach/Hod/Yesod -->
    <line x1="16" y1="18" x2="25" y2="23"/>
    <line x1="16" y1="18" x2="7"  y2="23"/>
    <line x1="16" y1="18" x2="16" y2="26"/>
    <!-- Netzach/Hod to Yesod -->
    <line x1="25" y1="23" x2="16" y2="26"/>
    <line x1="7"  y1="23" x2="16" y2="26"/>
    <!-- Yesod to Malkuth -->
    <line x1="16" y1="26" x2="16" y2="30"/>
    <line x1="25" y1="23" x2="16" y2="30"/>
    <line x1="7"  y1="23" x2="16" y2="30"/>
  </g>

  <!-- Sefirot — standard gold, Kether/Tiphareth brighter -->
  <!-- Kether -->
  <circle cx="16" cy="3"  r="2.1" fill="#f5e070" stroke="#ffe090" stroke-width="0.4"/>
  <!-- Chokmah -->
  <circle cx="25" cy="8"  r="1.8" fill="#c9a84c" stroke="#e0c060" stroke-width="0.4"/>
  <!-- Binah -->
  <circle cx="7"  cy="8"  r="1.8" fill="#c9a84c" stroke="#e0c060" stroke-width="0.4"/>
  <!-- Chesed -->
  <circle cx="25" cy="15" r="1.8" fill="#c9a84c" stroke="#e0c060" stroke-width="0.4"/>
  <!-- Geburah -->
  <circle cx="7"  cy="15" r="1.8" fill="#c9a84c" stroke="#e0c060" stroke-width="0.4"/>
  <!-- Tiphareth (center — slightly larger and brighter) -->
  <circle cx="16" cy="18" r="2.3" fill="#f5e070" stroke="#ffe090" stroke-width="0.5"/>
  <!-- Netzach -->
  <circle cx="25" cy="23" r="1.8" fill="#c9a84c" stroke="#e0c060" stroke-width="0.4"/>
  <!-- Hod -->
  <circle cx="7"  cy="23" r="1.8" fill="#c9a84c" stroke="#e0c060" stroke-width="0.4"/>
  <!-- Yesod -->
  <circle cx="16" cy="26" r="1.8" fill="#c9a84c" stroke="#e0c060" stroke-width="0.4"/>
  <!-- Malkuth (earthly — darker gold) -->
  <circle cx="16" cy="30" r="1.6" fill="#7a5a10" stroke="#c9a84c" stroke-width="0.4"/>
</svg>
